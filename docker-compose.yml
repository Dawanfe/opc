services:
  weopc-app:
    build:
      context: ./next
      dockerfile: Dockerfile
    container_name: weopc-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_APP_SECRET=${WECHAT_APP_SECRET:-}
      - WECHAT_REDIRECT_URI=${WECHAT_REDIRECT_URI:-https://weopc.com.cn/api/auth/wechat/callback}
      - NEXT_PUBLIC_FRONTEND_URL=${NEXT_PUBLIC_FRONTEND_URL:-https://weopc.com.cn}
      - NEXT_PUBLIC_WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - TZ=Asia/Shanghai
      # OPC 社区同步接口配置
      - COMMUNITY_SYNC_SECRET=${COMMUNITY_SYNC_SECRET:-}
      - COMMUNITY_SYNC_API_KEY=${COMMUNITY_SYNC_API_KEY:-}
      - ALLOWED_SYNC_IPS=${ALLOWED_SYNC_IPS:-}
      - MAX_SYNC_BATCH_SIZE=${MAX_SYNC_BATCH_SIZE:-100}
      - ENABLE_AUTO_BACKUP=${ENABLE_AUTO_BACKUP:-true}
    volumes:
      - weopc-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  weopc-data:
    driver: local
